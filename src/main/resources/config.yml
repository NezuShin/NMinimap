#Vanilla map id for plugin to work with
map-id: 0

#Map is rendered and cached by chunks
#Every rendered chunk must have representation in ram to be displayed on map
cache:
  #Cache tiles instead of rendering it every time
  allow-file-cache: true
  #How much tiles to store? Every chunk is about 380 bytes
  max-tiles-in-ram: 1000
  #Render chunk before it is needed? Useful if you are pre-generating your world using Chunky
  render-new-chunks: true

#How many chunks can be rendered simultaneously?
#Recommended to set this property to 1 if you are using spigot as server platform because it is not supports async chink loading
max-render-threads: 30

#How frequent update player's map? In ticks. One second is 20 ticks
# 1 = 20 updates per second; 2 = 10 updates; etc.
player-render-interval: 1

#Map size in pixels. Minimum value is 10; Maximum is 127
#The value is baked into shader, so changing it will require re-applying the resource pack.
#Also, this setting will not apply if  resourcepack.copy-defaults set to false.
map-pixel-size: 127

#When rendering worlds with a ceiling(e.g. Nether), should it be skipped?
#false - only display buildings above the ceiling (like vanilla maps do)
#true - also display territory under the ceiling
skip-ceiling: true

database:
  mysql:
    #Use mysql or sqlite?
    use: false
    ssl: true
    port: 3306
    host: 127.0.0.1
    username: root
    password: root
    database: storage
    table-names:
      players: nminimap_players

markers:
  #Marker for player on minimap. Leave empty brackets to disable
  player-marker: "player"
  #Marker for another players in world on minimap. Leave empty brackets to disable
  another-players-marker: "player_small"

#Supported languages: en_US, ru_RU
#Lang file will be copied to NMinimap/lang/<name>.yml
language: en_US

#Markers are symbols in font, so player needs resourcepack installed to see them.
#Also, plugin uses core shader to work.
resourcepack:
  #Copy the default pack.mcmeta and shader files to resourcepack folder. Files are only copied if they do not already exist
  copy-defaults: true
  #where to copy resourcepack folder after building font files?
  copy-destinations:
  #    - 'PackMerger/packs/nminimap'
  #    - 'C:\Users\nezushin\AppData\Roaming\.minecraft\resourcepacks\nminimap'
  zip-destinations:
    - 'NMinimap/built-pack.zip'
#    - 'PackMerger/packs/nminimap.zip'
#    - 'C:\Users\nezushin\AppData\Roaming\.minecraft\resourcepacks\nminimap.zip'
  pack-mcmeta:
    #Should plugin manage pack.mcmeta file?
    enable: true
    #Pack description
    description: 'NMinimap pack'
    overlays:
      #Enable shader for 1.21.11?
      enable-1-21-11: true
      enable-26-1: true

scale:
  #Max scale that can be selected using /map scale command.
  max-scale: 8
  #Check permission nminimap.scale.<scale> for /map scale <scale> command
  use-permission: false

#Default settings for players who joined server for first time
default-settings:
  #Enable minimap if client sent this brand. This feature is not supported on spigot.
  enable-if-brand-is: [vanilla, optifine]
  #Enable without any conditions
  enable-anyway: false
  #Acceptable values: 1, 2, 4, 8
  scale: 1
  #left or right
  side: left
  #round or square
  style: square

#Currently works with VoxelMap and Xaero's Minimap
mods-compatibility:
  mode: 1
  #Modes:
  #1 - Always disable mod-driven minimap
  #2 - Disable mod-driven minimap only if plugin-driven minimap is activated
  #3 - Do not disable mod-driven minimap

  #Enable compatibility for:
  enable-voxel-map: true
  enable-xaeros-map: true
  #Note that Xaero's Minimap disable/enable action will always result empty message in chat.
  enable-journey-map: true

  allow-radar: false


updates:
  #modrinth update checker
  check-for-updates: true

#Static markers always displayed on map
#To remove any markers, write static-markers: {}
static-markers:
  my-banner:
    #Icon from ./icons directory
    icon: "white_banner"
    x: 0
    z: 0
    #marker rotation. From 0 to 360
    yaw: 180
    world: "world"