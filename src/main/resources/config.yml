#Vanilla map id for plugin to work with
map-id: 0

#Map is rendered and cached by chunks
#Every rendered chunk must have representation in ram to be displayed on map
cache:
  #Cache tiles instead of rendering it every time
  allow-file-cache: true
  #Threshold for available disk space to stop writing to cache.
  #Setting 10G will leave free 10 gigabytes of space and then stop writing to cache
  #You can use G for gigabytes, M for megabytes and K for Kilobytes.
  available-disk-space-threshold: "10G"
  #Render chunk before it is needed? Useful if you are pre-generating your world using Chunky
  render-new-chunks: true
  #Delay cache load (for cases where additional worlds not being loaded on enable).
  #0 for instant cache loading
  #In ticks. 1 second = 20 ticks
  load-delay: 20
  #Delete cached tile if world not found
  validate-worlds: false
  #Delete cached tile file if it is not readable?
  delete-if-read-failed: true


#How many chunks can be rendered simultaneously?
#Recommended to set this property to 1 if you are using spigot as server platform because it is not supports async chink loading
max-render-threads: 30

#How frequent update player's map? In ticks. One second is 20 ticks
# 1 = 20 updates per second; 2 = 10 updates; etc.
player-render-interval: 1

#How frequent update player's current worldguard region? Used by underground-layers.
#In ticks. One second is 20 ticks
# 1 = 20 updates per second; 2 = 10 updates; etc.
worldguard-region-update-interval: 10

#Map size in pixels. Minimum value is 10; Maximum is 127
#The value is baked into shader, so changing it will require re-applying the resource pack.
#Also, this setting will not apply if  resourcepack.copy-defaults set to false.
map-pixel-size: 127

#When rendering worlds with a ceiling(e.g. Nether), should it be skipped?
#false - only display buildings above the ceiling (like vanilla maps do)
#true - also display territory under the ceiling
skip-ceiling: true

database:
  mysql:
    #Use mysql or sqlite?
    use: false
    ssl: true
    port: 3306
    host: 127.0.0.1
    username: root
    password: root
    database: storage
    table-names:
      players: nminimap_players

markers:
  #Marker for player on minimap. Leave empty quotes to disable
  player-marker: "player"
  #Marker for another players in world on minimap. Leave empty quotes to disable
  another-players-marker: "player_small"

  #You can enforce marker sizes for shader using this config section
  sizes:
    #NMinimap/markers/player.png
    player:
      #size in pixels
      height: 5
      width: 5

    player_small:
      #size in pixels
      height: 5
      width: 5


    white_banner:
      #size in pixels
      height: 5
      width: 5

disallowed-worlds:
  #Regex pattern for advanced users. Usable when you have short-living worlds such as boss arenas
  #Left empty to disable regex checks
  #Examples:
  # Block all worlds with name starts with "my_world_" (my_world_1, my_world_etc): "^(my_world_).*$"
  # Same as above but ends with "_my_world" (1_my_world, etc_my_world): "^.*(_my_world)$"
  # Block all world except one with name "world": "^(?!world$).*"
  regex: ""

  #Simple list of worlds where map disallowed
  blacklist:
    - "my_world_with_disallowed_minimap"

#Supported languages: en_US, ru_RU
#Lang file will be copied to NMinimap/lang/<name>.yml
language: en_US

#Markers are symbols in font, so player needs resourcepack installed to see them.
#Also, plugin uses core shader to work.
resourcepack:
  #Copy the default pack.mcmeta and shader files to resourcepack folder. Files are only copied if they do not already exist
  copy-defaults: true
  #where to copy resourcepack folder after building font files?
  copy-destinations: []
  #    - 'PackMerger/packs/nminimap'
  #    - 'C:\Users\nezushin\AppData\Roaming\.minecraft\resourcepacks\nminimap'
  zip-destinations:
    - 'NMinimap/built-pack.zip'
#    - 'PackMerger/packs/nminimap.zip'
#    - 'C:\Users\nezushin\AppData\Roaming\.minecraft\resourcepacks\nminimap.zip'
  pack-mcmeta:
    #Should plugin manage pack.mcmeta file?
    enable: true
    #Pack description
    description: 'NMinimap pack'
    overlays:
      #Enable shader for 1.21.11?
      enable-1-21-11: true
      enable-26-1: true
      enable-26-2: true

    #add "formats" and "supported_formats" fields to pack.mcmeta? Needed for compatibility when merging with another resource packs or for an old minecraft versions
    use-formats: false

scale:
  #Max scale that can be selected using /map scale command.
  max-scale: 8
  #Check permission nminimap.scale.<scale> for /map scale <scale> command
  use-permission: false

#Default settings for players who joined server for first time
default-settings:
  #Enable minimap if client sent this brand. This feature is not supported on spigot.
  enable-if-brand-is: [vanilla, optifine]
  #Enable without any conditions
  enable-anyway: false
  #Acceptable values: 1, 2, 4, 8
  scale: 1
  #left or right
  side: left
  #round or square
  style: square

#Currently works with VoxelMap and Xaero's Minimap
mods-compatibility:
  mode: 1
  #Modes:
  #1 - Always disable mod-driven minimap
  #2 - Disable mod-driven minimap only if plugin-driven minimap is activated
  #3 - Do not disable mod-driven minimap

  #Enable compatibility for:
  enable-voxel-map: true
  enable-xaeros-map: true
  #Note that Xaero's Minimap disable/enable action will always result empty message in chat.
  enable-journey-map: true

  allow-radar: false


updates:
  #modrinth update checker
  check-for-updates: true

#Static markers always displayed on map
static-markers:
  my-banner:
    #Icon from ./markers directory
    icon: "white_banner"
    x: 0
    z: 0
    #marker rotation. From 0 to 360
    yaw: 180
    world: "world"

# Configuration for underground layers (caves)
# It uses WorldGuard regions.
underground-layers:
  # Example:
  cave_layer_1:
    # List of WorldGuard region IDs where this layer is active
    wg-regions:
      - "my_cave_1"
      - "my_cave_2"
    # Start render from this Y level downwards (hides the ceiling)
    render-from-y: 50
    # Priority if overlapping (higher wins)
    priority: 1
    # Darken factor for chunks OUTSIDE this region (0.0=none, 1.0=max)
    darken: 0.5


config:
  #Merge config with its new versions
  allow-config-updates: true