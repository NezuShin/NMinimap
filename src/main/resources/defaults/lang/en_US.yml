insufficient_permissions: "<red>Insufficient permissions!"
you_cannot_use_this_scale: "<red>You can't use this scale!"

reload_start: "<#008f9a>Reloading..."
reload_complete: "<#008f9a>Reload complete!"
reload_failed: "<#008f9a>Reload failed! Check console to view detailed error"

admin_stats:
