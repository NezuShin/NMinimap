help:
  - '<reset><gray>----------------<#008f9a>NMinimap help<reset><gray>---------------'
  - "<reset><#08c0c2><click:suggest_command:'/mm enable'>/mm <#08c0c2>enable <#008f9a>turn on minimap"
  - "<reset><#08c0c2><click:suggest_command:'/mm disable'>/mm <#08c0c2>disable <#008f9a>turn off minimap"
  - "<reset><#08c0c2><click:suggest_command:'/mm scale '>/mm <#08c0c2>scale 1/2/4/8 <#008f9a>set minimap scale"
  - "<reset><#08c0c2><click:suggest_command:'/mm style '>/mm <#08c0c2>scale round/square <#008f9a>set minimap round or square"
  - "<reset><#08c0c2><click:suggest_command:'/mm side '>/mm <#08c0c2>side left/right <#008f9a>set position of minimap on screen"

